<svg xmlns="http://www.w3.org/2000/svg" width="192" height="192" viewBox="0 0 192 192">
  <rect width="192" height="192" rx="40" fill="#1e40af"/>
  <!-- Water -->
  <path d="M20 140 Q40 132 60 140 Q80 148 100 140 Q120 132 140 140 Q160 148 175 140" fill="none" stroke="#60a5fa" stroke-width="4" opacity="0.6"/>
  <path d="M15 150 Q35 142 55 150 Q75 158 95 150 Q115 142 135 150 Q155 158 178 150" fill="none" stroke="#60a5fa" stroke-width="3" opacity="0.4"/>
  <path d="M18 158 Q38 150 58 158 Q78 166 98 158 Q118 150 138 158 Q158 166 180 158" fill="none" stroke="#60a5fa" stroke-width="2.5" opacity="0.25"/>
  <!-- Hull - dark red/black like cargo ship -->
  <path d="M28 130 L42 138 L150 138 L164 130 L156 130 L28 130Z" fill="#1a1a2e"/>
  <path d="M42 138 L150 138 L164 130 L28 130 Z" fill="#dc2626"/>
  <rect x="28" y="124" width="136" height="6" rx="1" fill="#1a1a2e"/>
  <!-- Deck -->
  <rect x="34" y="118" width="124" height="8" rx="1" fill="#e5e7eb"/>
  <!-- Cargo holds (red covers) -->
  <rect x="58" y="108" width="18" height="12" rx="2" fill="#dc2626"/>
  <rect x="80" y="108" width="18" height="12" rx="2" fill="#dc2626"/>
  <rect x="102" y="108" width="18" height="12" rx="2" fill="#dc2626"/>
  <rect x="124" y="108" width="18" height="12" rx="2" fill="#dc2626"/>
  <!-- Cranes (yellow) -->
  <rect x="76" y="82" width="3" height="28" fill="#eab308"/>
  <path d="M77.5 82 L88 96" stroke="#eab308" stroke-width="2.5" stroke-linecap="round"/>
  <rect x="98" y="86" width="3" height="24" fill="#eab308"/>
  <path d="M99.5 86 L110 98" stroke="#eab308" stroke-width="2.5" stroke-linecap="round"/>
  <rect x="120" y="84" width="3" height="26" fill="#eab308"/>
  <path d="M121.5 84 L132 96" stroke="#eab308" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Bridge/cabin (white, left side like real cargo ships) -->
  <rect x="36" y="88" width="28" height="32" rx="3" fill="#f8fafc"/>
  <rect x="36" y="78" width="22" height="14" rx="2" fill="#f1f5f9"/>
  <!-- Bridge windows -->
  <rect x="40" y="82" width="5" height="4" rx="1" fill="#3b82f6"/>
  <rect x="47" y="82" width="5" height="4" rx="1" fill="#3b82f6"/>
  <!-- Cabin windows -->
  <rect x="40" y="94" width="4" height="4" rx="1" fill="#3b82f6"/>
  <rect x="47" y="94" width="4" height="4" rx="1" fill="#3b82f6"/>
  <rect x="54" y="94" width="4" height="4" rx="1" fill="#3b82f6"/>
  <!-- Smokestack -->
  <rect x="42" y="68" width="10" height="12" rx="2" fill="#374151"/>
  <rect x="42" y="68" width="10" height="4" rx="1" fill="#ef4444"/>
  <!-- Smoke -->
  <circle cx="47" cy="62" r="4" fill="white" opacity="0.4"/>
  <circle cx="52" cy="56" r="3" fill="white" opacity="0.25"/>
  <!-- Mast/antenna -->
  <line x1="50" y1="78" x2="50" y2="72" stroke="#94a3b8" stroke-width="1.5"/>
</svg>
