# LibreOffice headless e necessario para converter DOCX -> PDF
# nas rotas /api/documents/* quando format=pdf. Sem ele, o servidor
# retorna 503 indicando que so a versao Word esta disponivel.
#
# `which` e usado pelo helper src/lib/docx-to-pdf.ts para localizar
# o binario soffice em runtime (o Nix instala em /nix/store/<hash>,
# fora dos paths fixos que a lib libreoffice-convert conhece).
[phases.setup]
nixPkgs = ["nodejs_20", "libreoffice", "which"]
